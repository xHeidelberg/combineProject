<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS Pharmacy — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Incase cdn failed to load-->
  <link href="../src/output.css" rel="stylesheet">
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    .sidebar-collapsed .link-text,
    .sidebar-collapsed .logo-text { display: none; }
    body { transition: background-color 0.3s, color 0.3s; }
    .stat-card { transition: transform 0.15s, box-shadow 0.15s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.08); }
  </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100">

  <div class="flex h-screen overflow-hidden">

    <!-- ── Sidebar ────────────────────────────────────────────────────── -->
    <aside id="sidebar"
      class="bg-white dark:bg-gray-800 shadow-md w-64 transition-all duration-300 fixed md:relative z-20 h-full flex flex-col -translate-x-full md:translate-x-0">

      <div class="p-6 font-bold text-green-600 dark:text-green-400 text-xl flex items-center gap-4">
        <span class="min-w-[24px]">💊</span>
        <span class="logo-text whitespace-nowrap">RS Pharmacy</span>
      </div>

      <nav class="px-4 space-y-3 flex-1">
        <a id="nav-dashboard" href="#" class="flex items-center gap-4 p-2 rounded bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white transition-colors role-all">
          <span class="text-xl">🏠</span>
          <span class="link-text whitespace-nowrap">Dashboard</span>
        </a>
        <a id="nav-products" href="#" class="flex items-center gap-4 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors text-gray-700 dark:text-gray-300 role-admin role-pharmacist role-staff">
          <span class="text-xl">📦</span>
          <span class="link-text whitespace-nowrap">Products</span>
        </a>
        <a href="#" class="flex items-center gap-4 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors text-gray-700 dark:text-gray-300 role-admin role-pharmacist role-staff">
          <span class="text-xl">🛒</span>
          <span class="link-text whitespace-nowrap">Orders</span>
        </a>
        <a href="#" class="flex items-center gap-4 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors text-gray-700 dark:text-gray-300 role-all">
          <span class="text-xl">📅</span>
          <span class="link-text whitespace-nowrap">Appointments</span>
        </a>
        <a href="#" class="flex items-center gap-4 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors text-gray-700 dark:text-gray-300 role-admin">
          <span class="text-xl">👤</span>
          <span class="link-text whitespace-nowrap">Users</span>
        </a>
        <a href="#" class="flex items-center gap-4 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded transition-colors text-gray-700 dark:text-gray-300 role-patient">
          <span class="text-xl">📜</span>
          <span class="link-text whitespace-nowrap">My Prescriptions</span>
        </a>
      </nav>

      <!-- Logout button at bottom of sidebar -->
      <div class="px-4 pb-6">
        <button onclick="logout()"
          class="w-full flex items-center gap-4 p-2 hover:bg-red-50 dark:hover:bg-red-900/30 rounded transition-colors text-red-500 text-sm">
          <span class="text-xl">🚪</span>
          <span class="link-text whitespace-nowrap">Logout</span>
        </button>
      </div>
    </aside>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-10 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- ── Main content ────────────────────────────────────────────────── -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- Header -->
      <header class="bg-white dark:bg-gray-800 shadow p-4 flex justify-between items-center transition-colors">
        <div class="flex items-center gap-4">
          <button onclick="toggleSidebar()"
            class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <h1 class="text-xl font-semibold">Dashboard</h1>
        </div>

        <div class="flex items-center gap-4">
          <!-- Dark mode toggle -->
          <button onclick="toggleDarkMode()"
            class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-yellow-400 transition-colors">
            <span id="theme-icon-light" class="block dark:hidden">🌙</span>
            <span id="theme-icon-dark" class="hidden dark:block">☀️</span>
          </button>

          <!-- Role badge (read-only, set by JS) -->
          <div id="current-role"
            class="hidden sm:block text-xs font-semibold bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 px-3 py-1 rounded-full">
          </div>

          <!-- User name -->
          <span id="user-name" class="hidden sm:block text-sm text-gray-600 dark:text-gray-300"></span>

          <!-- Avatar with initials -->
          <div id="user-avatar"
            class="w-10 h-10 bg-green-600 text-white rounded-full flex items-center justify-center font-bold text-sm select-none cursor-default">
            …
          </div>
        </div>
      </header>

      <!-- Role-driven dashboard content injected here by dashboard.js -->
      <main class="p-6 overflow-y-auto">
        <div id="role-dashboard">
          <!-- Loading skeleton -->
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-6 animate-pulse">
            <div class="h-24 bg-gray-200 dark:bg-gray-700 rounded-xl"></div>
            <div class="h-24 bg-gray-200 dark:bg-gray-700 rounded-xl"></div>
            <div class="h-24 bg-gray-200 dark:bg-gray-700 rounded-xl"></div>
          </div>
          <div class="h-64 bg-gray-200 dark:bg-gray-700 rounded-xl animate-pulse"></div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // ── Sidebar toggle ────────────────────────────────────────────────────
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    // ── Dark mode toggle ──────────────────────────────────────────────────
    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
    }
    // Restore preference on load
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    }

    // ── Logout ────────────────────────────────────────────────────────────
    async function logout() {
      await fetch('/api/auth.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ action: 'logout' })
      });
      window.location.href = '/pages/auth.html';
    }
  </script>

  <script src="../assets/scripts/dashboard.js" defer></script>
  <script src="../assets/scripts/sidebar-products.js" defer></script>

</body>
</html>
