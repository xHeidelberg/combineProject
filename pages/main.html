<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS Pharmacy — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Incase cdn failed to load-->
  <link href="../src/output.css" rel="stylesheet">
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    :root {
      --primary: #e53935;
      --primary-dark: #c62828;
      --primary-light: #ffebee;
      --primary-muted: rgba(229, 57, 53, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }

    /* ── Sidebar ── */
    #sidebar {
      background: #0f0f0f;
      border-right: 1px solid rgba(255, 255, 255, 0.04);
    }

    .sidebar-logo {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 0.5rem;
    }

    .sidebar-logo .logo-pill {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(229, 57, 53, 0.35);
    }

    .sidebar-logo .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .sidebar-logo .logo-sub {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Nav items */
    #sidebar nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.45);
      transition: all 0.15s ease;
      text-decoration: none;
      margin-bottom: 2px;
    }

    #sidebar nav a:hover {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.85);
    }

    #sidebar nav a.active-nav,
    #sidebar nav a.bg-\[#e53935\] {
      background: var(--primary) !important;
      color: #fff !important;
      box-shadow: 0 4px 14px rgba(229, 57, 53, 0.3);
    }

    .nav-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #sidebar nav a:hover .nav-icon {
      background: rgba(255, 255, 255, 0.1);
    }

    #sidebar nav a.active-nav .nav-icon,
    #sidebar nav a.bg-\[#e53935\] .nav-icon {
      background: rgba(255, 255, 255, 0.2) !important;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.2);
      padding: 12px 12px 4px;
    }

    /* Sidebar collapsed */
    .sidebar-collapsed .link-text,
    .sidebar-collapsed .logo-text,
    .sidebar-collapsed .logo-sub,
    .sidebar-collapsed .nav-section-label {
      display: none;
    }

    .sidebar-collapsed {
      width: 64px !important;
    }

    .sidebar-collapsed .sidebar-logo {
      padding: 1rem 0.75rem;
    }

    /* Logout button */
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 500;
      color: rgba(229, 57, 53, 0.7);
      transition: all 0.15s ease;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
    }

    .logout-btn:hover {
      background: rgba(229, 57, 53, 0.1);
      color: var(--primary);
    }

    .logout-btn .nav-icon {
      background: rgba(229, 57, 53, 0.08);
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
    }

    .dark header {
      background: #111;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 6px 12px;
      width: 220px;
    }

    .dark .header-search {
      background: rgba(255, 255, 255, 0.06);
    }

    .header-search input {
      background: none;
      border: none;
      outline: none;
      font-size: 13px;
      color: #555;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
    }

    .dark .header-search input {
      color: rgba(255, 255, 255, 0.7);
    }

    .header-search input::placeholder {
      color: #aaa;
    }

    /* Role badge */
    #current-role {
      font-size: 11px;
      font-weight: 600;
      background: var(--primary-light);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.01em;
    }

    .dark #current-role {
      background: rgba(229, 57, 53, 0.15);
      color: #ff6b6b;
    }

    /* Avatar */
    #user-avatar {
      width: 36px;
      height: 36px;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      cursor: default;
      select-none: all;
      box-shadow: 0 2px 8px rgba(229, 57, 53, 0.3);
    }

    #user-name {
      font-size: 13px;
      font-weight: 500;
      color: #555;
    }

    .dark #user-name {
      color: rgba(255, 255, 255, 0.5);
    }

    /* ── Main content ── */
    main {
      background: #f7f7f8;
    }

    .dark main {
      background: #0d0d0d;
    }

    /* Stat cards modernized */
    .stat-card {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border-radius: 14px;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 999px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
    }

    /* ── Mobile overlay ── */
    #overlay {
      backdrop-filter: blur(4px);
    }

    /* ── Menu toggle button ── */
    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }

    .menu-btn:hover {
      background: #ebebeb;
    }

    .dark .menu-btn {
      background: rgba(255, 255, 255, 0.07);
    }

    .dark .menu-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Dark toggle */
    .theme-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 15px;
    }

    .theme-btn:hover {
      background: #ebebeb;
    }

    .dark .theme-btn {
      background: rgba(255, 255, 255, 0.07);
    }

    .dark .theme-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Notification bell */
    .notif-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 15px;
      position: relative;
    }

    .notif-btn:hover {
      background: #ebebeb;
    }

    .dark .notif-btn {
      background: rgba(255, 255, 255, 0.07);
    }

    .notif-dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 7px;
      height: 7px;
      background: var(--primary);
      border-radius: 50%;
      border: 2px solid #fff;
    }

    .dark .notif-dot {
      border-color: #111;
    }

    /* Page title breadcrumb */
    .page-title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.01em;
    }

    .dark .page-title {
      color: #fff;
    }

    /* ── Divider ── */
    .sidebar-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      margin: 8px 12px;
    }
  </style>
</head>

  <script>
    // ── Sidebar toggle ────────────────────────────────────────────────────
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    // ── Dark mode toggle ──────────────────────────────────────────────────
    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
    }
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    }

    // ── Analytics submenu toggle ─────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('analytics-toggle');
      const submenu = document.getElementById('analytics-submenu');
      const chevron = document.getElementById('analytics-chevron');
      if (!toggle || !submenu) return;

      toggle.addEventListener('click', (e) => {
        e.preventDefault();
        const opened = !submenu.classList.contains('hidden');
        // toggle visibility
        submenu.classList.toggle('hidden');
        toggle.setAttribute('aria-expanded', String(!opened));
        // rotate chevron
        if (chevron) chevron.style.transform = opened ? 'rotate(0deg)' : 'rotate(90deg)';
      });
    });

    // ── Logout ────────────────────────────────────────────────────────────
    async function logout() {
      await fetch('/api/auth.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ action: 'logout' })
      });
      // from dashboard to index
      window.location.href = '../index.html';
    }
  </script>
